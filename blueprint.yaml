blueprint:
  name: PIN-Keypad KEPZB-110 for Zigbee2MQTT
  description: "This Blueprint allows the synchronisation of an alarm control panel with a Zigbee2MQTT keypad. This means that the status of the alarm control panel is transmitted to the keypad and vice versa. Additionally, you can set a custom action for two wrong PINs. This way you can perform actions by entering specific wrong PINs. Includes full support for Night Mode."
  domain: automation
  input:
    z2m_keypad_path:
        name: MQTT State Topic of your Zigbee2MQTT Keypad
        description: "The State Topic is composed of your Zigbee2MQTT base_topic (see your Z2M Addon Configuration) and the Friendly Name of your keypad in Z2M. Example: zigbee2mqtt/Keypad"
    z2m_keypad_path_set:
        name: MQTT Set Topic of your Zigbee2MQTT Keypad
        description: "This is the same as your State Topic, with the addition of /set. Example: zigbee2mqtt/Keypad/set"
    control_panel:
        name: Control Panel
        description: "An alarm control panel. Example: https://www.home-assistant.io/integrations/manual"
        default: []
        selector:
            entity:
                domain: alarm_control_panel
    notify_service:
        name: Service de notification (Optionnel)
        description: "Service notify à utiliser pour la notification de désarmement. Exemple: notify.notify"
        default: "notify.notify"
        selector:
            text: {}
    action_arming:
        name: Action Arming
        description: "An action to be performed when the alarm panel changes to the arming state."
        default: []
        selector:
            action: {}
    action_armed_home:
        name: Action Armed Home
        description: "An action to be performed when the alarm panel changes to the armed home state."
        default: []
        selector:
            action: {}
    action_armed_away:
        name: Action Armed Away
        description: "An action to be performed when the alarm panel changes to the armed away state."
        default: []
        selector:
            action: {}
    action_armed_night:
        name: Action Armed Night
        description: "An action to be performed when the alarm panel changes to the armed night state."
        default: []
        selector:
            action: {}
    action_disarmed:
        name: Action Disarmed
        description: "An action to be performed when the alarm panel changes to the disarmed state."
        default: []
        selector:
            action: {}
    action_pending:
        name: Action Pending
        description: "An action to be performed when the alarm panel changes to the pending state."
        default: []
        selector:
            action: {}
    action_panic:
        name: Action Panic
        description: "An action to be performed when the panic / SOS button of the keypad is pressed."
        default: []
        selector:
            action: {}
    custpin1:
        name: Custom PIN 1
        default: "0000"
        description: "A custom PIN to trigger a custom action. Example: 0000"
    action_cust1:
        name: Action Custom 1
        description: "An action to be performed when custom PIN 1 is entered."
        default: []
        selector:
            action: {}
    custpin2:
        name: Custom PIN 2
        default: "1111"
        description: "A custom PIN to trigger a custom action. Example: 1111"
    action_cust2:
        name: Action Custom 2
        description: "An action to be performed when custom PIN 2 is entered."
        default: []
        selector:
            action: {}
    sensor_entities:
        name: Entry Delay Sensors (Optional)
        description: "Select entry sensors (doors) that should trigger entry delay beeps when opened while armed - giving you time to disarm"
        default: []
        selector:
            entity:
                domain: 
                  - binary_sensor
                multiple: true
    entry_delay_duration:
        name: Entry Delay Beep Duration
        description: "How long the entry delay beep should continue (in seconds)"
        default: 30
        selector:
            number:
                min: 10
                max: 120
                step: 5

variables:
  pin_var_cust1: !input 'custpin1'
  pin_var_cust2: !input 'custpin2'
  control_panel_id: !input 'control_panel'
  notify_service_var: !input 'notify_service'

trigger:
  - platform: state
    entity_id: !input 'control_panel'
    to: arming
    id: panel_arming
  - platform: state
    entity_id: !input 'control_panel'
    to: armed_home
    id: panel_armed_home
  - platform: state
    entity_id: !input 'control_panel'
    to: armed_away
    id: panel_armed_away
  - platform: state
    entity_id: !input 'control_panel'
    to: armed_night
    id: panel_armed_night
  - platform: state
    entity_id: !input 'control_panel'
    to: disarmed
    id: panel_disarmed
  - platform: state
    entity_id: !input 'control_panel'
    to: pending
    id: panel_pending
  - platform: mqtt
    topic: !input z2m_keypad_path
    id: keypad_mqtt
  - platform: state
    entity_id: !input sensor_entities
    to: 'on'
    id: entry_sensor_triggered

condition: []

action:
  - choose:
      - conditions:
          - condition: trigger
            id: panel_arming
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input 'control_panel'
                    state: armed_home
                    attribute: next_state
                sequence:
                  - service: mqtt.publish
                    data:
                      topic: !input 'z2m_keypad_path_set'
                      payload: '{"arm_mode": {"mode": "arm_day_zones"}}'
              - conditions:
                  - condition: state
                    entity_id: !input 'control_panel'
                    state: armed_away
                    attribute: next_state
                sequence:
                  - service: mqtt.publish
                    data:
                      topic: !input 'z2m_keypad_path_set'
                      payload: '{"arm_mode": {"mode": "exit_delay"}}'
              - conditions:
                  - condition: state
                    entity_id: !input 'control_panel'
                    state: armed_night
                    attribute: next_state
                sequence:
                  - service: mqtt.publish
                    data:
                      topic: !input 'z2m_keypad_path_set'
                      payload: '{"arm_mode": {"mode": "arm_night_zones"}}'
            default: []
          - choose:
            default: !input 'action_arming'

      - conditions:
          - condition: trigger
            id: panel_armed_away
        sequence:
          - service: mqtt.publish
            data:
              topic: !input 'z2m_keypad_path_set'
              payload: '{"arm_mode": {"mode": "arm_all_zones"}}'
          - choose:
            default: !input 'action_armed_away'

      - conditions:
          - condition: trigger
            id: panel_armed_home
        sequence:
          - service: mqtt.publish
            data:
              topic: !input 'z2m_keypad_path_set'
              payload: '{"arm_mode": {"mode": "arm_day_zones"}}'
          - choose:
            default: !input 'action_armed_home'

      - conditions:
          - condition: trigger
            id: panel_armed_night
        sequence:
          - service: mqtt.publish
            data:
              topic: !input 'z2m_keypad_path_set'
              payload: '{"arm_mode": {"mode": "arm_night_zones"}}'
          - choose:
            default: !input 'action_armed_night'

      - conditions:
          - condition: trigger
            id: panel_disarmed
        sequence:
          - service: mqtt.publish
            data:
              topic: !input 'z2m_keypad_path_set'
              payload: '{"arm_mode": {"mode": "disarm"}}'
          - variables:
              who_disarmed: "{{ state_attr(control_panel_id, 'changed_by') | default('Inconnu') }}"
          - service: "{{ notify_service_var }}"
            data:
              title: "🔓 Alarme désactivée"
              message: >-
                {{ who_disarmed }} a désactivé l'alarme à l'aide de son code
                à {{ now().strftime('%H:%M') }} le {{ now().strftime('%d/%m/%Y') }}.
          - choose:
            default: !input 'action_disarmed'

      - conditions:
          - condition: trigger
            id: panel_pending
        sequence:
          - service: mqtt.publish
            data:
              topic: !input 'z2m_keypad_path_set'
              payload: '{"arm_mode": {"mode": "entry_delay"}}'
          - choose:
            default: !input 'action_pending'

      - conditions:
          - condition: trigger
            id: entry_sensor_triggered
          - condition: or
            conditions:
              - condition: state
                entity_id: !input 'control_panel'
                state: armed_away
              - condition: state
                entity_id: !input 'control_panel'
                state: armed_home
              - condition: state
                entity_id: !input 'control_panel'
                state: armed_night
        sequence:
          - service: mqtt.publish
            data:
              topic: !input 'z2m_keypad_path_set'
              payload: '{"arm_mode": {"mode": "entry_delay"}}'

      - conditions:
          - condition: trigger
            id: keypad_mqtt
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action_transaction is defined and
                         trigger.payload_json.action_transaction != null }}
                sequence:
                  - service: mqtt.publish
                    data:
                      topic: !input 'z2m_keypad_path_set'
                      payload: |-
                        {
                          "arm_mode": {
                            "transaction": "{{ trigger.payload_json.action_transaction }}",
                            "mode": "{{ trigger.payload_json.action }}"
                          }
                        }

          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action_transaction is defined and
                         trigger.payload_json.action_code | string == pin_var_cust1 | string }}
                sequence:
                  - choose:
                    default: !input 'action_cust1'

          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action_transaction is defined and
                         trigger.payload_json.action_code | string == pin_var_cust2 | string }}
                sequence:
                  - choose:
                    default: !input 'action_cust2'

          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action == "arm_all_zones" and
                         trigger.payload_json.action_code is defined }}
                sequence:
                  - variables:
                      state_before: "{{ states(control_panel_id) }}"
                  - service: alarm_control_panel.alarm_arm_away
                    target:
                      entity_id: !input 'control_panel'
                    data:
                      code: "{{ trigger.payload_json.action_code }}"
                  - delay:
                      milliseconds: 500
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(control_panel_id) == state_before }}"
                        sequence:
                          - service: mqtt.publish
                            data:
                              topic: !input 'z2m_keypad_path_set'
                              payload: |-
                                {
                                  "arm_mode": {
                                    "transaction": "{{ trigger.payload_json.action_transaction }}",
                                    "mode": "invalid_code"
                                  }
                                }

              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action == "arm_day_zones" and
                         trigger.payload_json.action_code is defined }}
                sequence:
                  - variables:
                      state_before: "{{ states(control_panel_id) }}"
                  - service: alarm_control_panel.alarm_arm_home
                    target:
                      entity_id: !input 'control_panel'
                    data:
                      code: "{{ trigger.payload_json.action_code }}"
                  - delay:
                      milliseconds: 500
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(control_panel_id) == state_before }}"
                        sequence:
                          - service: mqtt.publish
                            data:
                              topic: !input 'z2m_keypad_path_set'
                              payload: |-
                                {
                                  "arm_mode": {
                                    "transaction": "{{ trigger.payload_json.action_transaction }}",
                                    "mode": "invalid_code"
                                  }
                                }

              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action == "arm_night_zones" and
                         trigger.payload_json.action_code is defined }}
                sequence:
                  - variables:
                      state_before: "{{ states(control_panel_id) }}"
                  - service: alarm_control_panel.alarm_arm_night
                    target:
                      entity_id: !input 'control_panel'
                    data:
                      code: "{{ trigger.payload_json.action_code }}"
                  - delay:
                      milliseconds: 500
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(control_panel_id) == state_before }}"
                        sequence:
                          - service: mqtt.publish
                            data:
                              topic: !input 'z2m_keypad_path_set'
                              payload: |-
                                {
                                  "arm_mode": {
                                    "transaction": "{{ trigger.payload_json.action_transaction }}",
                                    "mode": "invalid_code"
                                  }
                                }

              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action == "disarm" and
                         trigger.payload_json.action_code is defined }}
                sequence:
                  - variables:
                      state_before: "{{ states(control_panel_id) }}"
                  - service: alarm_control_panel.alarm_disarm
                    target:
                      entity_id: !input 'control_panel'
                    data:
                      code: "{{ trigger.payload_json.action_code }}"
                  - delay:
                      milliseconds: 500
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(control_panel_id) == state_before }}"
                        sequence:
                          - service: mqtt.publish
                            data:
                              topic: !input 'z2m_keypad_path_set'
                              payload: |-
                                {
                                  "arm_mode": {
                                    "transaction": "{{ trigger.payload_json.action_transaction }}",
                                    "mode": "invalid_code"
                                  }
                                }
                          - service: "{{ notify_service_var }}"
                            data:
                              title: "⚠️ Code invalide"
                              message: >-
                                Un code invalide a été saisi sur le clavier
                                à {{ now().strftime('%H:%M') }}
                                le {{ now().strftime('%d/%m/%Y') }}.


              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action == "panic" }}
                sequence:
                  - choose:
                    default: !input 'action_panic'

            default:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: !input 'control_panel'
                        state: armed_away
                    sequence:
                      - service: mqtt.publish
                        data:
                          topic: !input 'z2m_keypad_path_set'
                          payload: '{"arm_mode": {"mode": "arm_all_zones"}}'
                  - conditions:
                      - condition: state
                        entity_id: !input 'control_panel'
                        state: armed_home
                    sequence:
                      - service: mqtt.publish
                        data:
                          topic: !input 'z2m_keypad_path_set'
                          payload: '{"arm_mode": {"mode": "arm_day_zones"}}'
                  - conditions:
                      - condition: state
                        entity_id: !input 'control_panel'
                        state: armed_night
                    sequence:
                      - service: mqtt.publish
                        data:
                          topic: !input 'z2m_keypad_path_set'
                          payload: '{"arm_mode": {"mode": "arm_night_zones"}}'
                  - conditions:
                      - condition: state
                        entity_id: !input 'control_panel'
                        state: disarmed
                    sequence:
                      - service: mqtt.publish
                        data:
                          topic: !input 'z2m_keypad_path_set'
                          payload: '{"arm_mode": {"mode": "disarm"}}'
                  - conditions:
                      - condition: state
                        entity_id: !input 'control_panel'
                        state: arming
                      - condition: state
                        entity_id: !input 'control_panel'
                        state: armed_home
                        attribute: next_state
                    sequence:
                      - service: mqtt.publish
                        data:
                          topic: !input 'z2m_keypad_path_set'
                          payload: '{"arm_mode": {"mode": "arm_day_zones"}}'
                  - conditions:
                      - condition: state
                        entity_id: !input 'control_panel'
                        state: arming
                      - condition: state
                        entity_id: !input 'control_panel'
                        state: armed_away
                        attribute: next_state
                    sequence:
                      - service: mqtt.publish
                        data:
                          topic: !input 'z2m_keypad_path_set'
                          payload: '{"arm_mode": {"mode": "arm_all_zones"}}'
                  - conditions:
                      - condition: state
                        entity_id: !input 'control_panel'
                        state: arming
                      - condition: state
                        entity_id: !input 'control_panel'
                        state: armed_night
                        attribute: next_state
                    sequence:
                      - service: mqtt.publish
                        data:
                          topic: !input 'z2m_keypad_path_set'
                          payload: '{"arm_mode": {"mode": "arm_night_zones"}}'
    default: []

mode: parallel
max: 10
