blueprint:
  name: Clavier PIN KEPZB-110 avec RFID pour Zigbee2MQTT & Alarmo
  description: "Synchronisation d'un panneau d'alarme avec un clavier Zigbee2MQTT via Alarmo, incluant la gestion des codes personnalisés et des badges RFID."
  domain: automation
  input:
    z2m_keypad_path:
        name: Topic MQTT État de votre clavier Zigbee2MQTT
        description: "Exemple: zigbee2mqtt/Clavier"
    z2m_keypad_path_set:
        name: Topic MQTT Set de votre clavier Zigbee2MQTT
        description: "Exemple: zigbee2mqtt/Clavier/set"
    control_panel:
        name: Panneau d'alarme
        description: "Un panneau de contrôle d'alarme."
        default: []
        selector:
            entity:
                domain: alarm_control_panel
    notify_service:
        name: Service de notification (Optionnel)
        description: "Service notify à utiliser. Exemple: notify.notify"
        default: "notify.notify"
        selector:
            text: {}
    failed_attempts_counter:
        name: Entité compteur de tentatives échouées
        description: "Entité counter créée pour compter les codes invalides."
        selector:
            entity:
                domain: counter
    max_failed_attempts:
        name: Nombre de tentatives avant alerte
        default: 4
        selector:
            number:
                min: 1
                max: 10
                step: 1
                mode: slider
    action_max_attempts:
        name: Action après trop de tentatives échouées
        default: []
        selector:
            action: {}
    enable_tamper:
        name: Activer la détection d'ouverture du boîtier
        default: true
        selector:
            boolean: {}
    action_tamper:
        name: Action en cas d'ouverture du boîtier (Tamper)
        default: []
        selector:
            action: {}
    action_arming:
        name: Action Armement en cours
        default: []
        selector:
            action: {}
    action_armed_home:
        name: Action Armé à domicile
        default: []
        selector:
            action: {}
    action_armed_away:
        name: Action Armé absent
        default: []
        selector:
            action: {}
    action_armed_night:
        name: Action Armé nuit
        default: []
        selector:
            action: {}
    action_disarmed:
        name: Action Désarmé
        default: []
        selector:
            action: {}
    action_pending:
        name: Action En attente
        default: []
        selector:
            action: {}
    action_panic:
        name: Action Panique
        default: []
        selector:
            action: {}
    custpin1:
        name: Code PIN personnalisé 1
        default: "0000"
    action_cust1:
        name: Action Code personnalisé 1
        default: []
        selector:
            action: {}
    custpin2:
        name: Code PIN personnalisé 2
        default: "1111"
    action_cust2:
        name: Action Code personnalisé 2
        default: []
        selector:
            action: {}
    rfid_badge1:
        name: ID du Badge RFID 1
        default: ""
        description: "L'identifiant du badge RFID (Ex: 12345678). Laisser vide si non utilisé."
    action_rfid1:
        name: Action Badge RFID 1
        description: "Action exécutée quand le badge RFID 1 est scanné."
        default: []
        selector:
            action: {}
    rfid_badge2:
        name: ID du Badge RFID 2
        default: ""
        description: "L'identifiant du badge RFID (Ex: 87654321). Laisser vide si non utilisé."
    action_rfid2:
        name: Action Badge RFID 2
        description: "Action exécutée quand le badge RFID 2 est scanné."
        default: []
        selector:
            action: {}

variables:
  pin_var_cust1: !input 'custpin1'
  pin_var_cust2: !input 'custpin2'
  rfid_var_1: !input 'rfid_badge1'
  rfid_var_2: !input 'rfid_badge2'
  control_panel_id: !input 'control_panel'
  notify_service_var: !input 'notify_service'
  failed_attempts_counter_id: !input 'failed_attempts_counter'
  max_failed_attempts_var: !input 'max_failed_attempts'
  enable_tamper_var: !input 'enable_tamper'

trigger:
  - platform: state
    entity_id: !input 'control_panel'
    to: arming
    id: panel_arming
  - platform: state
    entity_id: !input 'control_panel'
    to: armed_home
    id: panel_armed_home
  - platform: state
    entity_id: !input 'control_panel'
    to: armed_away
    id: panel_armed_away
  - platform: state
    entity_id: !input 'control_panel'
    to: armed_night
    id: panel_armed_night
  - platform: state
    entity_id: !input 'control_panel'
    to: disarmed
    id: panel_disarmed
  - platform: state
    entity_id: !input 'control_panel'
    to: pending
    id: panel_pending
  - platform: mqtt
    topic: !input z2m_keypad_path
    id: keypad_mqtt

condition: []

action:
  - choose:
      - conditions:
          - condition: trigger
            id: panel_arming
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input 'control_panel'
                    state: armed_home
                    attribute: next_state
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: !input 'z2m_keypad_path_set'
                      payload: '{"arm_mode": {"mode": "arm_day_zones"}}'
              - conditions:
                  - condition: state
                    entity_id: !input 'control_panel'
                    state: armed_away
                    attribute: next_state
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: !input 'z2m_keypad_path_set'
                      payload: '{"arm_mode": {"mode": "exit_delay"}}'
              - conditions:
                  - condition: state
                    entity_id: !input 'control_panel'
                    state: armed_night
                    attribute: next_state
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: !input 'z2m_keypad_path_set'
                      payload: '{"arm_mode": {"mode": "arm_night_zones"}}'
            default: []
          - choose:
            default: !input 'action_arming'

      - conditions:
          - condition: trigger
            id: panel_armed_away
        sequence:
          - action: mqtt.publish
            data:
              topic: !input 'z2m_keypad_path_set'
              payload: '{"arm_mode": {"mode": "arm_all_zones"}}'
          - choose:
            default: !input 'action_armed_away'

      - conditions:
          - condition: trigger
            id: panel_armed_home
        sequence:
          - action: mqtt.publish
            data:
              topic: !input 'z2m_keypad_path_set'
              payload: '{"arm_mode": {"mode": "arm_day_zones"}}'
          - choose:
            default: !input 'action_armed_home'

      - conditions:
          - condition: trigger
            id: panel_armed_night
        sequence:
          - action: mqtt.publish
            data:
              topic: !input 'z2m_keypad_path_set'
              payload: '{"arm_mode": {"mode": "arm_night_zones"}}'
          - choose:
            default: !input 'action_armed_night'

      - conditions:
          - condition: trigger
            id: panel_disarmed
        sequence:
          - action: mqtt.publish
            data:
              topic: !input 'z2m_keypad_path_set'
              payload: '{"arm_mode": {"mode": "disarm"}}'
          - variables:
              who_disarmed: "{{ state_attr(control_panel_id, 'changed_by') | default('Inconnu') }}"
          - action: "{{ notify_service_var }}"
            data:
              title: "🔓 Alarme désactivée"
              message: >-
                {{ who_disarmed }} a désactivé l'alarme à l'aide de son code
                à {{ now().strftime('%H:%M') }} le {{ now().strftime('%d/%m/%Y') }}.
          - action: counter.reset
            target:
              entity_id: !input 'failed_attempts_counter'
          - choose:
            default: !input 'action_disarmed'

      - conditions:
          - condition: trigger
            id: panel_pending
        sequence:
          - action: mqtt.publish
            data:
              topic: !input 'z2m_keypad_path_set'
              payload: '{"arm_mode": {"mode": "entry_delay"}}'
          - choose:
            default: !input 'action_pending'

      - conditions:
          - condition: trigger
            id: keypad_mqtt
        sequence:
          # Tamper
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.tamper is defined and
                         trigger.payload_json.tamper == true and
                         enable_tamper_var == true and
                         states(control_panel_id) in ['armed_away', 'armed_home', 'armed_night', 'arming', 'pending'] }}
                sequence:
                  - action: "{{ notify_service_var }}"
                    data:
                      title: "🔧 Alerte boîtier clavier ouvert"
                      message: >-
                        Le boîtier du clavier a été ouvert (tamper)
                        à {{ now().strftime('%H:%M') }} le {{ now().strftime('%d/%m/%Y') }}.
                  - choose:
                    default: !input 'action_tamper'

          # PIN custom 1
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action_transaction is defined and
                         trigger.payload_json.action_code is defined and
                         trigger.payload_json.action_code | string == pin_var_cust1 | string }}
                sequence:
                  - choose:
                    default: !input 'action_cust1'

          # PIN custom 2
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action_transaction is defined and
                         trigger.payload_json.action_code is defined and
                         trigger.payload_json.action_code | string == pin_var_cust2 | string }}
                sequence:
                  - choose:
                    default: !input 'action_cust2'

          # Badge RFID 1
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action_transaction is defined and
                         trigger.payload_json.action_code is defined and
                         rfid_var_1 != "" and
                         trigger.payload_json.action_code | string == rfid_var_1 | string }}
                sequence:
                  - choose:
                    default: !input 'action_rfid1'

          # Badge RFID 2
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action_transaction is defined and
                         trigger.payload_json.action_code is defined and
                         rfid_var_2 != "" and
                         trigger.payload_json.action_code | string == rfid_var_2 | string }}
                sequence:
                  - choose:
                    default: !input 'action_rfid2'

          # Actions clavier (Arm_all_zones)
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action == "arm_all_zones" and
                         trigger.payload_json.action_code is defined }}
                sequence:
                  - variables:
                      state_before: "{{ states(control_panel_id) }}"
                  - action: alarm_control_panel.alarm_arm_away
                    target:
                      entity_id: !input 'control_panel'
                    data:
                      code: "{{ trigger.payload_json.action_code }}"
                  - delay:
                      milliseconds: 500
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(control_panel_id) != state_before }}"
                        sequence:
                          # ✅ Code/Badge valide : confirmation positive
                          - action: mqtt.publish
                            data:
                              topic: !input 'z2m_keypad_path_set'
                              payload: >-
                                {"arm_mode": {"transaction": {{ trigger.payload_json.action_transaction }}, "mode": "arm_all_zones"}}
                    default:
                      # ❌ Code/Badge invalide
                      - action: mqtt.publish
                        data:
                          topic: !input 'z2m_keypad_path_set'
                          payload: >-
                            {"arm_mode": {"transaction": {{ trigger.payload_json.action_transaction }}, "mode": "invalid_code"}}
                      - action: counter.increment
                        target:
                          entity_id: !input 'failed_attempts_counter'
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ states(failed_attempts_counter_id) | int >= max_failed_attempts_var | int }}"
                            sequence:
                              - action: "{{ notify_service_var }}"
                                data:
                                  title: "🚨 Alerte sécurité clavier"
                                  message: >-
                                    {{ max_failed_attempts_var }} codes invalides saisis sur le clavier
                                    à {{ now().strftime('%H:%M') }} le {{ now().strftime('%d/%m/%Y') }}.
                              - choose:
                                default: !input 'action_max_attempts'
                              - action: counter.reset
                                target:
                                  entity_id: !input 'failed_attempts_counter'

          # Actions clavier (Arm_day_zones)
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action == "arm_day_zones" and
                         trigger.payload_json.action_code is defined }}
                sequence:
                  - variables:
                      state_before: "{{ states(control_panel_id) }}"
                  - action: alarm_control_panel.alarm_arm_home
                    target:
                      entity_id: !input 'control_panel'
                    data:
                      code: "{{ trigger.payload_json.action_code }}"
                  - delay:
                      milliseconds: 500
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(control_panel_id) != state_before }}"
                        sequence:
                          - action: mqtt.publish
                            data:
                              topic: !input 'z2m_keypad_path_set'
                              payload: >-
                                {"arm_mode": {"transaction": {{ trigger.payload_json.action_transaction }}, "mode": "arm_day_zones"}}
                    default:
                      - action: mqtt.publish
                        data:
                          topic: !input 'z2m_keypad_path_set'
                          payload: >-
                            {"arm_mode": {"transaction": {{ trigger.payload_json.action_transaction }}, "mode": "invalid_code"}}
                      - action: counter.increment
                        target:
                          entity_id: !input 'failed_attempts_counter'
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ states(failed_attempts_counter_id) | int >= max_failed_attempts_var | int }}"
                            sequence:
                              - action: "{{ notify_service_var }}"
                                data:
                                  title: "🚨 Alerte sécurité clavier"
                                  message: >-
                                    {{ max_failed_attempts_var }} codes invalides saisis sur le clavier
                                    à {{ now().strftime('%H:%M') }} le {{ now().strftime('%d/%m/%Y') }}.
                              - choose:
                                default: !input 'action_max_attempts'
                              - action: counter.reset
                                target:
                                  entity_id: !input 'failed_attempts_counter'

          # Actions clavier (Arm_night_zones)
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action == "arm_night_zones" and
                         trigger.payload_json.action_code is defined }}
                sequence:
                  - variables:
                      state_before: "{{ states(control_panel_id) }}"
                  - action: alarm_control_panel.alarm_arm_night
                    target:
                      entity_id: !input 'control_panel'
                    data:
                      code: "{{ trigger.payload_json.action_code }}"
                  - delay:
                      milliseconds: 500
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(control_panel_id) != state_before }}"
                        sequence:
                          - action: mqtt.publish
                            data:
                              topic: !input 'z2m_keypad_path_set'
                              payload: >-
                                {"arm_mode": {"transaction": {{ trigger.payload_json.action_transaction }}, "mode": "arm_night_zones"}}
                    default:
                      - action: mqtt.publish
                        data:
                          topic: !input 'z2m_keypad_path_set'
                          payload: >-
                            {"arm_mode": {"transaction": {{ trigger.payload_json.action_transaction }}, "mode": "invalid_code"}}
                      - action: counter.increment
                        target:
                          entity_id: !input 'failed_attempts_counter'
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ states(failed_attempts_counter_id) | int >= max_failed_attempts_var | int }}"
                            sequence:
                              - action: "{{ notify_service_var }}"
                                data:
                                  title: "🚨 Alerte sécurité clavier"
                                  message: >-
                                    {{ max_failed_attempts_var }} codes invalides saisis sur le clavier
                                    à {{ now().strftime('%H:%M') }} le {{ now().strftime('%d/%m/%Y') }}.
                              - choose:
                                default: !input 'action_max_attempts'
                              - action: counter.reset
                                target:
                                  entity_id: !input 'failed_attempts_counter'

          # Actions clavier (Disarm)
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action == "disarm" and
                         trigger.payload_json.action_code is defined }}
                sequence:
                  - variables:
                      state_before: "{{ states(control_panel_id) }}"
                  - action: alarm_control_panel.alarm_disarm
                    target:
                      entity_id: !input 'control_panel'
                    data:
                      code: "{{ trigger.payload_json.action_code }}"
                  - delay:
                      milliseconds: 500
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(control_panel_id) != state_before }}"
                        sequence:
                          - action: mqtt.publish
                            data:
                              topic: !input 'z2m_keypad_path_set'
                              payload: >-
                                {"arm_mode": {"transaction": {{ trigger.payload_json.action_transaction }}, "mode": "disarm"}}
                    default:
                      - action: mqtt.publish
                        data:
                          topic: !input 'z2m_keypad_path_set'
                          payload: >-
                            {"arm_mode": {"transaction": {{ trigger.payload_json.action_transaction }}, "mode": "invalid_code"}}
                      - action: counter.increment
                        target:
                          entity_id: !input 'failed_attempts_counter'
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ states(failed_attempts_counter_id) | int >= max_failed_attempts_var | int }}"
                            sequence:
                              - action: "{{ notify_service_var }}"
                                data:
                                  title: "🚨 Alerte sécurité clavier"
                                  message: >-
                                    {{ max_failed_attempts_var }} codes invalides saisis sur le clavier
                                    à {{ now().strftime('%H:%M') }} le {{ now().strftime('%d/%m/%Y') }}.
                              - choose:
                                default: !input 'action_max_attempts'
                              - action: counter.reset
                                target:
                                  entity_id: !input 'failed_attempts_counter'

          # Action Urgence / Panique
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.payload_json.action == "emergency" }}
                sequence:
                  - choose:
                    default: !input 'action_panic'

mode: parallel
max: 10